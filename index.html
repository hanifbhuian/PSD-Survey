  <style>
    body{margin:0;font-family:"Noto Sans Bengali","SolaimanLipi","Hind Siliguri",Arial,sans-serif;background:#f0fdfa;color:#17312d;line-height:1.6}.loading{max-width:760px;margin:80px auto;padding:24px;background:#fff;border:1px solid #dcebe7;border-radius:22px;box-shadow:0 14px 35px rgba(15,118,110,.12);text-align:center}.spinner{width:42px;height:42px;border:4px solid #dff4ef;border-top-color:#0f766e;border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.btn{display:inline-block;margin-top:14px;background:#0f766e;color:#fff;text-decoration:none;border-radius:14px;padding:12px 18px;font-weight:800}
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <h2>জরিপ ফর্ম খুলছে...</h2>
    <p>অনুগ্রহ করে কয়েক সেকেন্ড অপেক্ষা করুন।</p>
    <a class="btn" href="https://script.google.com/macros/s/AKfycbw_WS2SyYCU2_9pzNBlcWhTDI4dgVZawRk0sNNNFq2WnxCWHjzpMUR04AkeOxuoNd1n/exec">সমস্যা হলে এখানে ক্লিক করুন</a>
  </div>

  <script>
    const SOURCE_HTML = "https://raw.githubusercontent.com/hanifbhuian/PSD-Survey/4e1d3ab1fb206394d58b8713d9302e218401d5e0/index.html";
    const FINAL_MESSAGE = "ধন্যবাদ। আপনার উত্তর সফলভাবে জমা হয়েছে। তথ্য ভেরিফাই করে আগামী ২দিনের মধ্যে আপনার বিকাশ নাম্বারে সম্মানী পাঠিয়ে দেয়া হবে।";
    const bengaliDigits = "০১২৩৪৫৬৭৮৯";
    const digitMap = {
      "۰":"০","۱":"১","۲":"২","۳":"৩","۴":"৪","۵":"۵","۶":"۶","۷":"۷","۸":"۸","۹":"۹",
      "٠":"۰","١":"۱","٢":"۲","٣":"۳","٤":"۴","٥":"۵","٦":"۶","٧":"۷","٨":"۸","٩":"۹"
    };
    // Correct any Arabic/Persian digits in the visible questionnaire text while keeping the phone-number conversion script intact.
    function normalizeOutsideScripts(html){
      return html.split(/(<script[\s\S]*?<\/script>)/gi).map(part=>{
        if(/^<script/i.test(part)) return part;
        return part.replace(/[۰-۹٠-٩]/g, d => digitMap[d] || d);
      }).join("");
    }
    function applyFinalMessage(html){
      html = html.replace(/<p id="successMessage">[\s\S]*?<\/p>/, '<p id="successMessage">' + FINAL_MESSAGE + '</p>');
      html = html.replace(/document\.getElementById\("successMessage"\)\.textContent\s*=\s*result\.message\s*\|\|\s*"[^"]*"\s*;/, 'document.getElementById("successMessage").textContent = "' + FINAL_MESSAGE + '";');
      html = html.replace(/আগামী ২ দিনের মধ্যে আপনার বিকাশ নম্বরে সম্মানী পাঠিয়ে দেওয়া হবে।/g, "আগামী ২দিনের মধ্যে আপনার বিকাশ/নগদ নাম্বারে সম্মানী পাঠিয়ে দেয়া হবে।");
      return html;
    }
    fetch(SOURCE_HTML, {cache:"no-store"})
      .then(r => { if(!r.ok) throw new Error("Form source failed"); return r.text(); })
      .then(html => {
        html = normalizeOutsideScripts(html);
        html = applyFinalMessage(html);
        document.open();
        document.write(html);
        document.close();
      })
      .catch(() => {
        document.querySelector(".loading").innerHTML = '<h2>ফর্ম লোড করা যায়নি</h2><p>অনুগ্রহ করে আবার refresh করুন অথবা নিচের বাটনে ক্লিক করুন।</p><a class="btn" href="https://script.google.com/macros/s/AKfycbw_WS2SyYCU2_9pzNBlcWhTDI4dgVZawRk0sNNNFq2WnxCWHjzpMUR04AkeOxuoNd1n/exec">জরিপ ফর্ম খুলুন</a>';
      });
  </script>
</body>
</html>

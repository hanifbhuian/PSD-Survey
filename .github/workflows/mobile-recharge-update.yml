name: Update honorarium to mobile recharge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-form:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace honorarium wording
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index_path = Path('index.html')
          html = index_path.read_text(encoding='utf-8')

          replacements = {
            'অংশগ্রহণকারীর বিকাশ/নগদ নম্বরে ২৫ টাকা সম্মানী পাঠানো হবে।': 'অংশগ্রহণকারীকে ২৫ টাকা মোবাইল রিচার্জ দেওয়া হবে।',
            'জরিপে অংশগ্রহণকারীর বিকাশ/নগদ নম্বরে ২৫ টাকা পাঠানো হবে (১-২ দিনের মধ্যে)': 'জরিপে অংশগ্রহণকারীকে ২৫ টাকা মোবাইল রিচার্জ দেওয়া হবে (১–২ দিনের মধ্যে)',
            'মোবাইল ও বিকাশ/নগদ নম্বর বাধ্যতামূলক।': 'মোবাইল ও রিচার্জ নম্বর বাধ্যতামূলক।',
            '৪. আপনার বিকাশ/নগদ নম্বর': '৪. মোবাইল রিচার্জের জন্য নম্বর',
            'সম্মানী পাঠানোর জন্য প্রয়োজন।': '২৫ টাকা মোবাইল রিচার্জ পাঠানোর জন্য প্রয়োজন।',
            'ধন্যবাদ। আপনার উত্তর সফলভাবে জমা হয়েছে। তথ্য ভেরিফাই করে আগামী ২দিনের মধ্যে আপনার বিকাশ/নগদ নাম্বারে ২৫ টাকা সম্মানী পাঠিয়ে দেয়া হবে।': 'ধন্যবাদ। আপনার উত্তর সফলভাবে জমা হয়েছে। তথ্য যাচাই শেষে আগামী ২ দিনের মধ্যে আপনার প্রদত্ত মোবাইল নম্বরে ২৫ টাকা রিচার্জ পাঠানো হবে।'
          }

          for old, new in replacements.items():
            html = html.replace(old, new)

          index_path.write_text(html, encoding='utf-8')

          guard_path = Path('device-guard.js')
          guard = guard_path.read_text(encoding='utf-8')
          guard = guard.replace(
            'তথ্য যাচাই শেষে আগামী ২ দিনের মধ্যে আপনার বিকাশ/নগদ নম্বরে ২৫ টাকা সম্মানী পাঠানো হবে।',
            'তথ্য যাচাই শেষে আগামী ২ দিনের মধ্যে আপনার প্রদত্ত মোবাইল নম্বরে ২৫ টাকা রিচার্জ পাঠানো হবে।'
          )
          guard = guard.replace(
            '• একই মোবাইল, বিকাশ/নগদ নম্বর বা একই ডিভাইস থেকে একবারের বেশি অংশগ্রহণ করা যাবে না।',
            '• একই মোবাইল বা রিচার্জ নম্বর অথবা একই ডিভাইস থেকে একবারের বেশি অংশগ্রহণ করা যাবে না।'
          )
          guard = guard.replace(
            '• সঠিক তথ্য দিন; যাচাই শেষে ২৫ টাকা সম্মানী পাঠানো হবে।',
            '• সঠিক তথ্য দিন; যাচাই শেষে ২৫ টাকা মোবাইল রিচার্জ পাঠানো হবে।'
          )
          guard_path.write_text(guard, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html device-guard.js
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Change honorarium to 25 taka mobile recharge"
            git push
          fi

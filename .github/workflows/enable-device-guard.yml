name: Enable household device guard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load device guard and update duplicate wording
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          script_tag = '<script src="device-guard.js?v=1"></script>'
          if script_tag not in html:
              if '</body>' not in html:
                  raise SystemExit('Closing body tag not found')
              html = html.replace('</body>', script_tag + '\n</body>', 1)

          old_message = 'এই মোবাইল নম্বর দিয়ে আগে জরিপে অংশ নেওয়া হয়েছে। একই নম্বর দিয়ে একবারের বেশি অংশ নেওয়া যাবে না।'
          new_message = 'দুঃখিত! আপনি ইতিপূর্বে একবার জরিপে অংশগ্রহণ করেছেন এবং আপনার পূর্বের জরিপটি সফলভাবে সম্পন্ন হয়েছে। একই পরিবারের সর্বোচ্চ একজন জরিপে অংশগ্রহণ করতে পারবে এবং একই ডিভাইস থেকে দ্বিতীয়বার অংশগ্রহণ করা যাবে না।'
          html = html.replace(old_message, new_message)
          html = html.replace('GitHub Pages static form v20', 'GitHub Pages static form v21')

          path.write_text(html, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Enable household and device restriction"
            git push
          fi

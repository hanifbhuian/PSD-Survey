name: Add visitor tracker loader

on:
  push:
    paths:
      - '.github/workflows/add-visitor-tracker-loader.yml'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert visitor tracker script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          tag = '<script src="visitor-tracker.js?v=1"></script>'
          if tag not in text:
              marker = '<script src="device-guard.js?v=1"></script>'
              if marker in text:
                  text = text.replace(marker, marker + '\n' + tag, 1)
              else:
                  text = text.replace('</body>', tag + '\n</body>', 1)
              p.write_text(text, encoding='utf-8')
          PY
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Load visitor tracker on survey page"
          git push
